name: OpenHOTAS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  firmware-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware

      - name: Build firmware
        working-directory: firmware
        run: cargo build --release --target thumbv8m.main-none-eabihf

      - name: Install picotool
        run: |
          curl -L -o /tmp/picotool.tar.gz https://github.com/raspberrypi/pico-sdk-tools/releases/download/v2.2.0-3/picotool-2.2.0-a4-x86_64-lin.tar.gz
          tar -xzf /tmp/picotool.tar.gz -C /tmp
          sudo install /tmp/picotool/picotool /usr/local/bin/picotool

      - name: Copy ELF
        run: cp target/thumbv8m.main-none-eabihf/release/openhotas openhotas.elf

      - name: Generate UF2
        run: picotool uf2 convert openhotas.elf -t elf openhotas.uf2 -t uf2 --platform rp2350 --abs-block

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openhotas.elf
            openhotas.uf2

  cli-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build CLI
        working-directory: cli
        run: cargo build --release

      - name: Copy binary
        run: cp target/release/openhotas-cli openhotas-cli-linux-amd64

      - name: Upload CLI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: openhotas-cli-linux-amd64

  cli-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build CLI
        working-directory: cli
        run: cargo build --release

      - name: Copy binary
        shell: pwsh
        run: Copy-Item target/release/openhotas-cli.exe openhotas-cli-windows-amd64.exe

      - name: Upload Windows CLI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: openhotas-cli-windows-amd64.exe

  gui-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install dependencies
        working-directory: gui
        run: npm ci

      - name: Build Windows GUI
        working-directory: gui
        run: npm run tauri build

      - name: Prepare portable Windows GUI
        shell: pwsh
        run: |
          $portable = "OpenHOTAS-Configurator-${{ github.ref_name }}-portable-x64.exe"
          Copy-Item target/release/openhotas-gui.exe $portable
          $hash = (Get-FileHash $portable -Algorithm SHA256).Hash.ToLower()
          "$hash  $portable" | Set-Content "$portable.sha256"

      - name: Upload Windows GUI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenHOTAS-Configurator-${{ github.ref_name }}-portable-x64.exe
            OpenHOTAS-Configurator-${{ github.ref_name }}-portable-x64.exe.sha256
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            gui/src-tauri/target/release/bundle/msi/*.msi
            gui/src-tauri/target/release/bundle/nsis/*.exe
