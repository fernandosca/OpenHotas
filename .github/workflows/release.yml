name: OpenHOTAS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  firmware-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware

      - name: Build firmware
        working-directory: firmware
        run: cargo build --release --target thumbv8m.main-none-eabihf

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install elf2uf2-rs
        run: cargo install elf2uf2-rs

      - name: Copy ELF
        run: cp target/thumbv8m.main-none-eabihf/release/openhotas openhotas.elf

      - name: Generate UF2
        run: elf2uf2-rs openhotas.elf openhotas.uf2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openhotas.elf
            openhotas.uf2

  cli-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build CLI
        working-directory: cli
        run: cargo build --release

      - name: Copy binary
        run: cp target/release/openhotas-cli openhotas-cli-linux-amd64

      - name: Upload CLI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: openhotas-cli-linux-amd64

  cli-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build CLI
        working-directory: cli
        run: cargo build --release

      - name: Copy binary
        shell: pwsh
        run: Copy-Item target/release/openhotas-cli.exe openhotas-cli-windows-amd64.exe

      - name: Upload Windows CLI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: openhotas-cli-windows-amd64.exe

  gui-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install dependencies
        working-directory: gui
        run: npm ci

      - name: Build Windows GUI
        working-directory: gui
        run: npm run tauri build

      - name: Upload Windows GUI to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            gui/src-tauri/target/release/bundle/msi/*.msi
            gui/src-tauri/target/release/bundle/nsis/*.exe
