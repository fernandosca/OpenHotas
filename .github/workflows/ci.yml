name: OpenHOTAS CI

on:
    push:
    pull_request:

jobs:
    protocol:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: crates/openhotas-protocol

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: crates/openhotas-protocol

            - name: Build
              run: cargo build

            - name: Clippy
              run: cargo clippy -- -D warnings

            - name: Format check
              run: cargo fmt --check

    firmware:
        runs-on: ubuntu-latest
        needs: protocol

        defaults:
            run:
                working-directory: firmware

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: thumbv8m.main-none-eabihf

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: firmware

            - name: Build
              run: cargo build --release --target thumbv8m.main-none-eabihf

            - name: Install picotool
              working-directory: ${{ github.workspace }}
              run: |
                  curl -L -o /tmp/picotool.tar.gz https://github.com/raspberrypi/pico-sdk-tools/releases/download/v2.2.0-3/picotool-2.2.0-a4-x86_64-lin.tar.gz
                  tar -xzf /tmp/picotool.tar.gz -C /tmp
                  sudo install /tmp/picotool/picotool /usr/local/bin/picotool

            - name: Generate UF2
              working-directory: ${{ github.workspace }}
              run: |
                  picotool uf2 convert \
                    target/thumbv8m.main-none-eabihf/release/openhotas \
                    -t elf openhotas.uf2 -t uf2 --platform rp2350 --abs-block

            - name: Upload firmware artifact
              uses: actions/upload-artifact@v7
              with:
                  name: openhotas-firmware-${{ github.sha }}
                  path: openhotas.uf2
                  if-no-files-found: error

            - name: Clippy
              run: cargo clippy --target thumbv8m.main-none-eabihf -- -D warnings

            - name: Format check
              run: cargo fmt --check

    cli:
        runs-on: ubuntu-latest
        needs: protocol

        defaults:
            run:
                working-directory: cli

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: cli

            - name: Build
              run: cargo build

            - name: Clippy
              run: cargo clippy -- -D warnings

            - name: Format check
              run: cargo fmt --check

    gui:
        runs-on: ubuntu-latest
        needs: protocol

        defaults:
            run:
                working-directory: gui

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: gui/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install Tauri system dependencies
              run: >
                  sudo apt-get update &&
                  sudo apt-get install -y
                  build-essential
                  curl
                  file
                  libayatana-appindicator3-dev
                  libglib2.0-dev
                  librsvg2-dev
                  libssl-dev
                  libudev-dev
                  libwebkit2gtk-4.1-dev
                  libxdo-dev
                  pkg-config
                  wget

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: gui/src-tauri

            - name: Tauri backend check
              run: cargo check --manifest-path src-tauri/Cargo.toml

    gui-windows:
        runs-on: windows-latest
        needs: protocol

        defaults:
            run:
                working-directory: gui

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: gui/src-tauri

            - name: Check Windows Tauri backend
              run: cargo check --manifest-path src-tauri/Cargo.toml
