name: OpenHOTAS CI

on:
    push:
    pull_request:

jobs:
    protocol:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: crates/openhotas-protocol

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: crates/openhotas-protocol

            - name: Build
              run: cargo build

            - name: Clippy
              run: cargo clippy -- -D warnings

            - name: Format check
              run: cargo fmt --check

    firmware:
        runs-on: ubuntu-latest
        needs: protocol

        defaults:
            run:
                working-directory: firmware

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: thumbv8m.main-none-eabihf

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: firmware

            - name: Build
              run: cargo build --release --target thumbv8m.main-none-eabihf

            - name: Clippy
              run: cargo clippy --target thumbv8m.main-none-eabihf -- -D warnings

            - name: Format check
              run: cargo fmt --check

    cli:
        runs-on: ubuntu-latest
        needs: protocol

        defaults:
            run:
                working-directory: cli

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: cli

            - name: Build
              run: cargo build

            - name: Clippy
              run: cargo clippy -- -D warnings

            - name: Format check
              run: cargo fmt --check

    gui:
        runs-on: ubuntu-latest
        needs: protocol

        defaults:
            run:
                working-directory: gui

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: gui/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: TypeScript check
              run: npx tsc --noEmit

            - name: Build
              run: npm run build

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install Tauri system dependencies
              run: >
                  sudo apt-get update &&
                  sudo apt-get install -y
                  build-essential
                  curl
                  file
                  libayatana-appindicator3-dev
                  libglib2.0-dev
                  librsvg2-dev
                  libssl-dev
                  libudev-dev
                  libwebkit2gtk-4.1-dev
                  libxdo-dev
                  pkg-config
                  wget

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: gui/src-tauri

            - name: Tauri backend check
              run: cargo check --manifest-path src-tauri/Cargo.toml
